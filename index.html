<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

// === CONFIGURAÇÃO ===
const firebaseConfig = {
  apiKey: "AIzaSyAHg9HH5JQ3CX3LU5YUlc69ZIA67e3Y-QE",
  authDomain: "networkingcdgrupoesmeralda.firebaseapp.com",
  projectId: "networkingcdgrupoesmeralda",
  storageBucket: "networkingcdgrupoesmeralda.firebasestorage.app",
  messagingSenderId: "22591649770",
  appId: "1:22591649770:web:0e407a90654f2f3005e493"
};
const COLLECTION = "esmeralda"; // <-- diferente entre os 2 apps
const ADMIN_PASSWORD = "cdgrupo2026";
// =====================

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// State
let members = [];
let isAdmin = false;
let searchText = "";
let nichoFilter = "Todos";
let pendingFotoFile = null;

// Utils
const cleanPhone = (p) => (p || "").replace(/\D/g, "");
const cleanInsta = (i) => (i || "").replace("@", "").replace(/https?:\/\/(www\.)?instagram\.com\//, "").replace("/", "");
const $ = (id) => document.getElementById(id);
const closeModal = (id) => $(id).classList.add("hidden");
window.closeModal = closeModal;

// Load members from Firestore
async function loadMembers() {
  try {
    const q = query(collection(db, COLLECTION), orderBy("nome"));
    const snap = await getDocs(q);
    members = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch (e) {
    console.error("Erro ao carregar:", e);
    members = [];
  }
  $("loading").classList.add("hidden");
  render();
}

// Render grid
function render() {
  const filtered = members.filter(m => {
    const match = m.nome.toLowerCase().includes(searchText.toLowerCase()) ||
                  (m.nicho || "").toLowerCase().includes(searchText.toLowerCase());
    const nichoMatch = nichoFilter === "Todos" || m.nicho === nichoFilter;
    return match && nichoMatch;
  });

  // Counts
  const nichos = [...new Set(members.map(m => m.nicho).filter(Boolean))];
  $("count-members").textContent = `${members.length} ${members.length === 1 ? 'mentorado' : 'mentorados'}`;
  $("count-nichos").textContent = `${nichos.length} nichos`;

  // Nicho filters
  const filtersEl = $("nicho-filters");
  if (nichos.length > 0) {
    const allNichos = ["Todos", ...nichos.sort()];
    filtersEl.innerHTML = allNichos.map(n => `
      <button data-nicho="${n}" class="nicho-btn px-4 py-1.5 rounded-full text-sm whitespace-nowrap border transition-all ${
        nichoFilter === n
          ? 'gem-shimmer text-emerald-950 border-transparent font-semibold'
          : 'border-emerald-800/40 text-emerald-300/70 hover:border-emerald-600'
      }">${n}</button>
    `).join("");
    filtersEl.querySelectorAll(".nicho-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        nichoFilter = btn.dataset.nicho;
        render();
      });
    });
  } else {
    filtersEl.innerHTML = "";
  }

  // Empty state
  const empty = $("empty");
  const grid = $("grid");
  if (filtered.length === 0) {
    empty.classList.remove("hidden");
    grid.innerHTML = "";
    $("empty-msg").textContent = members.length === 0
      ? "Nenhum mentorado cadastrado ainda"
      : "Nenhum resultado";
    return;
  }
  empty.classList.add("hidden");

  // Cards
  grid.innerHTML = filtered.map(m => {
    const initial = m.nome.charAt(0).toUpperCase();
    const fotoHtml = m.foto
      ? `<img src="${m.foto}" alt="${m.nome}" class="relative w-16 h-16 rounded-full object-cover border-2 border-emerald-950">`
      : `<div class="relative w-16 h-16 rounded-full bg-emerald-900 border-2 border-emerald-950 flex items-center justify-center font-display text-2xl text-emerald-300">${initial}</div>`;
    const instaBtn = m.instagram ? `
      <a href="https://instagram.com/${cleanInsta(m.instagram)}" target="_blank" rel="noopener" class="flex items-center justify-center w-11 h-11 rounded-xl border border-emerald-700/40 hover:border-emerald-500 hover:bg-emerald-900/30 transition-all" title="@${cleanInsta(m.instagram)}">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
      </a>` : "";
    const deleteBtn = isAdmin ? `
      <button data-id="${m.id}" data-fotopath="${m.fotoPath || ''}" class="delete-btn absolute top-3 right-3 p-1.5 rounded-full bg-red-950/50 hover:bg-red-900 text-red-400 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>` : "";

    return `
      <article class="card-hover relative rounded-2xl bg-gradient-to-br from-emerald-950/80 to-slate-900/80 border border-emerald-800/30 p-5 backdrop-blur">
        ${deleteBtn}
        <div class="flex items-start gap-4 mb-4">
          <div class="relative shrink-0">
            <div class="absolute -inset-0.5 rounded-full gem-shimmer opacity-60 blur-sm"></div>
            ${fotoHtml}
          </div>
          <div class="flex-1 min-w-0 pt-1">
            <h3 class="font-display text-xl font-semibold text-emerald-50 leading-tight truncate">${m.nome}</h3>
            ${m.nicho ? `<p class="text-xs text-emerald-400 tracking-wide uppercase mt-1">${m.nicho}</p>` : ""}
          </div>
        </div>
        <div class="flex gap-2">
          <a href="https://wa.me/${cleanPhone(m.whatsapp)}" target="_blank" rel="noopener" class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl bg-emerald-600 hover:bg-emerald-500 text-white font-medium text-sm transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            WhatsApp
          </a>
          ${instaBtn}
        </div>
      </article>
    `;
  }).join("");

  // Delete handlers
  grid.querySelectorAll(".delete-btn").forEach(btn => {
    btn.addEventListener("click", () => handleDelete(btn.dataset.id, btn.dataset.fotopath));
  });
}

// Delete member
async function handleDelete(id, fotoPath) {
  if (!confirm("Remover este mentorado?")) return;
  // Otimista
  members = members.filter(m => m.id !== id);
  render();
  try {
    await deleteDoc(doc(db, COLLECTION, id));
    if (fotoPath) {
      try { await deleteObject(ref(storage, fotoPath)); } catch (e) { console.warn("Foto storage:", e); }
    }
  } catch (e) {
    console.error("Erro ao deletar:", e);
    alert("Erro ao remover do servidor. Recarregue a página.");
  }
}

// Compress image
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const max = 400;
        let { width, height } = img;
        if (width > height && width > max) { height = (height * max) / width; width = max; }
        else if (height > max) { width = (width * max) / height; height = max; }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.82);
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Add member
async function handleAdd() {
  const nome = $("f-nome").value.trim();
  const nicho = $("f-nicho").value.trim();
  const whatsapp = $("f-whatsapp").value.trim();
  const instagram = $("f-instagram").value.trim();
  if (!nome || !whatsapp) return;

  $("btn-save").disabled = true;
  $("btn-save").textContent = "Salvando…";
  $("save-error").classList.add("hidden");

  try {
    let fotoUrl = "";
    let fotoPath = "";

    if (pendingFotoFile) {
      const compressed = await compressImage(pendingFotoFile);
      const filename = `${COLLECTION}/${Date.now()}_${Math.random().toString(36).slice(2,7)}.jpg`;
      const sRef = ref(storage, filename);
      await uploadBytes(sRef, compressed);
      fotoUrl = await getDownloadURL(sRef);
      fotoPath = filename;
    }

    const docRef = await addDoc(collection(db, COLLECTION), {
      nome, nicho, whatsapp, instagram,
      foto: fotoUrl,
      fotoPath: fotoPath,
      createdAt: serverTimestamp()
    });

    members.push({ id: docRef.id, nome, nicho, whatsapp, instagram, foto: fotoUrl, fotoPath });
    members.sort((a,b) => a.nome.localeCompare(b.nome));
    render();

    // Limpa form
    $("f-nome").value = "";
    $("f-nicho").value = "";
    $("f-whatsapp").value = "";
    $("f-instagram").value = "";
    clearFotoPreview();
    closeModal("modal-form");
  } catch (e) {
    console.error("Erro:", e);
    $("save-error").textContent = "⚠️ " + (e.message || "Erro ao salvar");
    $("save-error").classList.remove("hidden");
  }

  $("btn-save").disabled = false;
  $("btn-save").textContent = "Salvar";
}

function clearFotoPreview() {
  pendingFotoFile = null;
  $("foto-preview-box").innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-600"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>`;
  $("foto-preview-box").className = "w-16 h-16 rounded-full border-2 border-dashed border-emerald-800 flex items-center justify-center shrink-0 overflow-hidden";
  $("foto-label").textContent = "Enviar do dispositivo";
  $("btn-remove-foto").classList.add("hidden");
  $("foto-status").classList.add("hidden");
  $("f-foto-file").value = "";
}

// Admin controls
function updateAdminControls() {
  const panel = $("admin-controls");
  if (isAdmin) {
    panel.innerHTML = `
      <button id="btn-add" class="px-4 py-2 rounded-full gem-shimmer text-emerald-950 font-semibold flex items-center gap-2 text-sm esmeralda-glow">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        Adicionar
      </button>
      <button id="btn-logout" class="text-xs text-emerald-400/60 hover:text-emerald-300">Sair do admin</button>
    `;
    $("btn-add").addEventListener("click", () => $("modal-form").classList.remove("hidden"));
    $("btn-logout").addEventListener("click", () => { isAdmin = false; updateAdminControls(); render(); });
  } else {
    panel.innerHTML = `
      <button id="btn-login" class="px-4 py-2 rounded-full border border-emerald-700/40 hover:border-emerald-500 hover:bg-emerald-900/30 transition-all flex items-center gap-2 text-sm">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Admin
      </button>
    `;
    $("btn-login").addEventListener("click", () => $("modal-login").classList.remove("hidden"));
  }
}

// Event listeners
$("search").addEventListener("input", (e) => { searchText = e.target.value; render(); });

$("btn-submit-login").addEventListener("click", () => {
  if ($("input-password").value === ADMIN_PASSWORD) {
    isAdmin = true;
    $("input-password").value = "";
    $("login-error").classList.add("hidden");
    closeModal("modal-login");
    updateAdminControls();
    render();
  } else {
    $("login-error").textContent = "Senha incorreta";
    $("login-error").classList.remove("hidden");
  }
});

$("input-password").addEventListener("keydown", (e) => {
  if (e.key === "Enter") $("btn-submit-login").click();
});

$("f-foto-file").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (!file.type.startsWith("image/")) {
    alert("Selecione uma imagem");
    return;
  }
  pendingFotoFile = file;
  const url = URL.createObjectURL(file);
  $("foto-preview-box").innerHTML = `<img src="${url}" class="w-full h-full object-cover">`;
  $("foto-preview-box").className = "w-16 h-16 rounded-full overflow-hidden border-2 border-emerald-700 shrink-0";
  $("foto-label").textContent = "Trocar foto";
  $("btn-remove-foto").classList.remove("hidden");
  const sizeKB = Math.round(file.size / 1024);
  $("foto-status").textContent = `${sizeKB}KB — será comprimida ao salvar`;
  $("foto-status").classList.remove("hidden");
});

$("btn-remove-foto").addEventListener("click", clearFotoPreview);
$("btn-save").addEventListener("click", handleAdd);

document.getElementById("modal-login").addEventListener("click", (e) => {
  if (e.target.id === "modal-login") closeModal("modal-login");
});
document.getElementById("modal-form").addEventListener("click", (e) => {
  if (e.target.id === "modal-form") closeModal("modal-form");
});

updateAdminControls();
loadMembers();
</script>

</body>
</html>
